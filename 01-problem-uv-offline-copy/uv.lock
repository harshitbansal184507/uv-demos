version = 1
revision = 3
requires-python = ">=3.12"

[[package]]
name = "click"
version = "8.3.1"
source = { registry = "output/deps/uv" }
dependencies = [
    { name = "colorama", marker = "sys_platform == 'win32'" },
]
sdist = { path = "click-8.3.1.tar.gz" }
wheels = [
    { path = "click-8.3.1-py3-none-any.whl" },
]

[[package]]
name = "colorama"
version = "0.4.6"
source = { registry = "output/deps/uv" }
sdist = { path = "colorama-0.4.6.tar.gz" }

[[package]]
name = "sample-project"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "click" },
]

[package.metadata]
requires-dist = [{ name = "click", specifier = "==8.3.1" }]
